name: Sync Tailscale ACLs
on:
  push:
    branches: [main]
    paths:
      - policy.hujson
      - .github/workflows/sync-acls.yaml
  pull_request:
    branches: [main]
    paths:
      - policy.hujson
      - .github/workflows/sync-acls.yaml

jobs:
  sync-acls:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: Test ACL policy (dry run)
        if: github.event_name == 'pull_request'
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -u "${TS_API_KEY}:" \
            --data-binary @policy.hujson \
            "https://api.tailscale.com/api/v2/tailnet/amerenda.github/acl/validate" \
            | grep -q 200 && echo "ACL policy is valid" || { echo "ACL validation failed"; exit 1; }

      - name: Apply ACL policy
        if: github.event_name == 'push'
        run: |
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST \
            -u "${TS_API_KEY}:" \
            -H "Content-Type: application/hujson" \
            --data-binary @policy.hujson \
            "https://api.tailscale.com/api/v2/tailnet/amerenda.github/acl")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "ACL policy applied successfully"
          else
            echo "Failed to apply ACL policy (HTTP $HTTP_CODE)"
            cat response.json
            exit 1
          fi
